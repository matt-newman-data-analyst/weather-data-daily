name: Update Combo Daily Weather Data
on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 06:00 UTC
    # re-saved to refresh schedule trigger registration
  workflow_dispatch:        # lets you trigger manually from GitHub too
permissions:
  contents: write
jobs:
  update-combo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run fetch script
        run: python scripts/fetch_combo_daily_data.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/_combo_daily_append.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update combo weather data $(date +'%Y-%m-%d')"
          git push
